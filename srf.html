<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#7b827e;
    padding:30px;
}

.container{
    width:900px;
    margin:auto;
    background:#635e65;
    color:white;
    padding:30px;
    border-radius:10px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    letter-spacing:2px;
}

table{
    width:100%;
}

td{
    padding:10px;
    vertical-align:top;
}

input[type=text],
input[type=email],
textarea,
select{
    width:100%;
    padding:8px;
    border:none;
    border-radius:5px;
}

textarea{
    resize:none;
}

.small{
    width:80px;
}

button{
    padding:10px 25px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.submit{
    background:white;
    color:purple;
}

.reset{
    background:white;
    color:red;
}

.qualify{
    border-collapse:collapse;
    width:100%;
    margin-top:10px;
}

.qualify th,
.qualify td{
    border:1px solid white;
    text-align:center;
    padding:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>STUDENT REGISTRATION FORM</h1>

<form>

<table>

<tr>
<td>First Name</td>
<td>
<input type="text" maxlength="30" required>
(Begin with capital letter)
</td>
</tr>

<tr>
<td>Last Name</td>
<td>
<input type="text" maxlength="30" required>
(Begin with capital letter)
</td>
</tr>

<tr>
<td>Date of Birth</td>

<td>

<select class="small">
<option>Day</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
<option>12</option>
<option>13</option>
<option>14</option>
<option>15</option>
<option>16</option>
<option>17</option>
<option>18</option>
<option>19</option>
<option>20</option>
<option>21</option>
<option>22</option>
<option>23</option>
<option>24</option>
<option>25</option>
<option>26</option>
<option>27</option>
<option>28</option>
<option>29</option>
<option>30</option>
<option>31</option>
</select>

<select class="small">
<option>Month</option>
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>

<select class="small">
<option>Year</option>
<option>2000</option>
<option>2001</option>
<option>2002</option>
<option>2003</option>
<option>2004</option>
<option>2005</option>
<option>2006</option>
<option>2007</option>
</select>

</td>
</tr>

<tr>
<td>Email ID</td>
<td>
<input type="email" required>
</td>
</tr>

<tr>
<td>Mobile Number</td>
<td>
<input type="text" maxlength="10">
</td>
</tr>

<tr>
<td>Gender</td>

<td>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</td>

</tr>

<tr>

<td>Address</td>

<td>

<textarea rows="4"></textarea>

</td>

</tr>
